name: Android Manual Release

on:
  workflow_dispatch:
    inputs:
      versionName:
        description: 'Version Name (eg. 1.2.3)'
        required: true
        type: string
      versionCode:
        description: 'Version Code (integer, eg. 1)'
        required: true
        type: string
      draft:
        description: 'Create release as draft?'
        required: true
        type: boolean
        default: false
      prerelease:
        description: 'Mark release as pre-release?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_PATH: app/release.keystore
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_ALIAS_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            -PversionName=${{ github.event.inputs.versionName }} \
            -PversionCode=${{ github.event.inputs.versionCode }}

      - name: Rename APK and set path
        id: apk
        run: |
          version="${{ github.event.inputs.versionName }}"
          src_apk=$(ls app/build/outputs/apk/release/*.apk | head -n 1)
          dest_apk="app/build/outputs/apk/release/Bridge_v${version}.apk"
          mv "$src_apk" "$dest_apk"
          echo "apk_path=$dest_apk" >> "$GITHUB_OUTPUT"

      - name: Generate metadata.json
        id: metadata
        run: |
          cat > metadata.json <<EOF
          {
            "name": "${{ github.event.inputs.versionName }}",
            "code": ${{ github.event.inputs.versionCode }}
          }
          EOF
          echo "metadata_path=metadata.json" >> "$GITHUB_OUTPUT"

      - name: Build release body
        id: body
        run: |
          new_tag="v${{ github.event.inputs.versionName }}"
          prev_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | sed -n '1p')
          repo_url="https://github.com/${{ github.repository }}"

          if [ -n "$prev_tag" ]; then
            content="更新日志：[${prev_tag}...${new_tag}](${repo_url}/compare/${prev_tag}...${new_tag})"
          else
            content="初始版本"
          fi

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "content<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$content" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.versionName }}
          name: v${{ github.event.inputs.versionName }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          body: ${{ steps.body.outputs.content }}
          files: |
            ${{ steps.apk.outputs.apk_path }}
            ${{ steps.metadata.outputs.metadata_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
